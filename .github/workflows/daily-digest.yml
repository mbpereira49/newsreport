name: Daily Digest

on:
  schedule:
    - cron: "0 14 * * *"
  workflow_dispatch: {}

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run digest
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python -m daily_digest.cli --config config/digest.example.json
      - name: Commit generated digest
        run: |
          git config user.name "daily-digest-bot"
          git config user.email "daily-digest-bot@users.noreply.github.com"
          git add out
          git diff --cached --quiet || git commit -m "Generate daily digest"
          git push

